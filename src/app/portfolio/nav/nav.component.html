<header class="nav" [class.is-scrolled]="scrolled()">
  <div class="nav__inner wrap">
    <a class="nav__brand" href="#top" (click)="go('top', $event)" aria-label="Harsha Madhamanchi — home">
      <span class="nav__mark">HM</span>
      <span class="nav__name">Harsha&nbsp;Madhamanchi</span>
    </a>

    <nav class="nav__links" aria-label="Primary">
      @for (link of links; track link.id) {
        <a
          class="nav__link"
          [class.is-active]="active() === link.id"
          [href]="'#' + link.id"
          (click)="go(link.id, $event)"
        >
          <span>{{ link.label }}</span>
        </a>
      }
      <a class="nav__cta" href="#contact" (click)="go('contact', $event)">Let’s talk</a>
    </nav>

    <button
      class="nav__burger"
      [class.is-open]="menuOpen()"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Toggle menu"
      aria-controls="mobile-menu"
    >
      <span></span><span></span>
    </button>
  </div>

  <!-- Mobile menu -->
  <div
    class="nav__sheet"
    id="mobile-menu"
    [class.is-open]="menuOpen()"
    [attr.inert]="menuOpen() ? null : ''"
  >
    <nav aria-label="Mobile">
      @for (link of links; track link.id; let i = $index) {
        <a
          class="sheet__link"
          [href]="'#' + link.id"
          (click)="go(link.id, $event)"
          [style.--i]="i"
        >
          <span class="sheet__num">0{{ i + 1 }}</span>
          <span class="sheet__label">{{ link.label }}</span>
        </a>
      }
    </nav>
  </div>
</header>

<div class="nav__overlay" [class.is-open]="menuOpen()" (click)="toggleMenu()" aria-hidden="true"></div>
