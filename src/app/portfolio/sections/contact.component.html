<section class="section contact" id="contact">
  <div class="wrap contact__inner">
    <div class="section-head" [appReveal]="0">
      <span class="idx">04</span>
      <span class="kicker">Contact</span>
    </div>

    <h2 class="contact__headline" [appReveal]="80">
      Let’s build<br />something <em>worth&nbsp;shipping.</em>
    </h2>

    <p class="contact__sub" [appReveal]="160">
      Always open to good ideas, interesting problems and new collaborations.
      If it’s a fit, count me in.
    </p>

    <div class="contact__cta" [appReveal]="220">
      <a class="btn btn--primary contact__mail" [href]="mailto">
        {{ email }} <span aria-hidden="true">→</span>
      </a>
    </div>

    <div class="contact__channels" [appReveal]="300">
      <a class="channel" href="https://www.linkedin.com/in/harsha-madhamanchi-575869119" target="_blank" rel="noopener">
        <span class="channel__k">LinkedIn</span>
        <span class="channel__v">in/harsha-madhamanchi <span aria-hidden="true">↗</span></span>
      </a>
      <a class="channel" href="https://github.com/madhamanchiharsha" target="_blank" rel="noopener">
        <span class="channel__k">GitHub</span>
        <span class="channel__v">&#64;madhamanchiharsha <span aria-hidden="true">↗</span></span>
      </a>
      <a class="channel" [href]="mailto">
        <span class="channel__k">Email</span>
        <span class="channel__v">Drop a line <span aria-hidden="true">↗</span></span>
      </a>
    </div>
  </div>
</section>
